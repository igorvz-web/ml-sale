    if(mgr)list=list.filter(function(r){return r.mgr===mgr;});
    if(tier==='high')list=list.filter(function(r){return r.ltv>avgLTV*2;});
    else if(tier==='mid')list=list.filter(function(r){return r.ltv>avgLTV&&r.ltv<=avgLTV*2;});
    else if(tier==='low')list=list.filter(function(r){return r.ltv<=avgLTV;});
    if(srch)list=list.filter(function(r){return r.name.toLowerCase().includes(srch);});
    const tw=document.getElementById('ltv-table');
    if(!list.length){tw.innerHTML='<div class="no-data">Нет клиентов</div>';return;}
    tw.innerHTML='<table><thead><tr><th>#</th><th>Клиент</th><th>Менеджер</th><th>LTV</th><th>LTV (маржа)</th><th>Ср.мес.выручка</th><th>Срок жизни</th><th>Удержание</th></tr></thead><tbody>'
      +list.slice(0,80).map(function(r,i){
        const tier2=r.ltv>avgLTV*2?'🔴':r.ltv>avgLTV?'🟡':'🟢';
        const pct2=Math.round(r.retentionRate*100);
        const pbar='<span class="pbar-wrap"><span class="pbar-fill" style="width:'+pct2+'%;background:'+(pct2>=60?'var(--gr)':pct2>=30?'var(--warm)':'var(--hot)')+'"></span></span>'+pct2+'%';
        return '<tr style="cursor:pointer" data-ltvi="'+i+'">'
          +'<td class="td-mono" style="color:var(--mt)">'+(i+1)+'</td>'
          +'<td class="td-name" title="'+esc(r.name)+'">'+esc(r.name)+'</td>'
          +'<td class="td-mgr">'+esc(r.mgr)+'</td>'
          +'<td class="td-mono" style="color:var(--pu);font-weight:600">'+tier2+' '+fmt(r.ltv)+'</td>'
          +'<td class="td-mono" style="color:var(--acc)">'+fmt(r.ltv_m)+'</td>'
          +'<td class="td-mono">'+fmt(Math.round(r.avgMonthly))+'</td>'
          +'<td class="td-mono">'+(r.lifespanMo||Math.round(r.lifespan))+' мес.</td>'
          +'<td style="font-size:11px">'+pbar+'</td>'
          +'</tr>';
      }).join('')+'</tbody></table>';
    tw.querySelectorAll('tbody tr').forEach(function(tr,i){tr.addEventListener('click',function(){showClientModal(list[i]);});});
  }
  ['ltv-mgr','ltv-tier'].forEach(function(id){document.getElementById(id).addEventListener('change',drawLTVTable);});
  document.getElementById('ltv-srch').addEventListener('input',drawLTVTable);
  drawLTVTable();
}

// ═══════════════════════════════════════════════════════════════════════════
// ─── COHORT ANALYSIS ──────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
function renderCohorts(m){
  const cohortMap={};
  DATA.forEach(function(r){
    const firstMo=r.mo.findIndex(function(v){return v>0;});
    if(firstMo<0)return;
    if(!cohortMap[firstMo])cohortMap[firstMo]={label:ML[firstMo],firstMo:firstMo,clients:[]};
    cohortMap[firstMo].clients.push(r);
  });
  const cohorts=Object.values(cohortMap).sort(function(a,b){return a.firstMo-b.firstMo;});
  const maxOff=ML.length-1;
  const cohortData=cohorts.map(function(c){
    const n=c.clients.length;
    const ret=[];
    for(var off=0;off<=maxOff;off++){
      const moIdx=c.firstMo+off;
      if(moIdx>=ML.length){ret.push(null);continue;}
      const active=c.clients.filter(function(r){return(r.mo[moIdx]||0)>0;}).length;
      ret.push(Math.round(active/n*100));
    }
    return{label:c.label,n:n,ret:ret};
  });
  const offLabels=Array.from({length:maxOff+1},function(_,i){return i===0?'M0':'M+'+i;});
  function hcol(v){
    if(v===null)return'transparent';
    if(v===0)return'rgba(255,255,255,.03)';
    if(v>=80)return'#1d4ed8';if(v>=60)return'#2563eb';if(v>=40)return'#3b82f6';
    if(v>=20)return'#60a5fa';if(v>=5)return'#93c5fd';return'#bfdbfe';
  }
  function tcol(v){return(v===null||v===0)?'transparent':'rgba(255,255,255,.85)';}
  const avgRet=offLabels.map(function(_,off){
    const vals=cohortData.map(function(c){return c.ret[off];}).filter(function(v){return v!==null&&v!==undefined;});
    return vals.length?Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length):null;
  });
  m.innerHTML='<div class="pg">'
    +'<div class="pg-hd"><div class="pg-ti">Когортный анализ</div><div class="pg-su">Retention по месяцам с первой покупки — '+cohorts.length+' когорт</div></div>'
    +analysisNote('Что такое когортный анализ','<strong>Когорта</strong> = группа клиентов, совершивших первую покупку в одном месяце. <strong>M0</strong> = базовый месяц (100%). <strong>M+1</strong> = % когорты, купивших в следующем месяце. Высокое удержание на ранних периодах → высокая лояльность клиентов. Помогает оценить качество клиентской базы и эффективность работы с повторными продажами.')
    
    +'<div class="cc" style="margin-bottom:14px"><div class="cc-ti">Retention matrix <span>'+cohorts.length+' когорт × '+offLabels.length+' периодов</span></div>'
    +'<div class="cohort-wrap"><table class="cohort-table"><thead><tr>'
    +'<th class="cohort-th" style="text-align:left;padding-right:6px">Когорта</th>'
    +'<th class="cohort-th">N</th>'
    +offLabels.map(function(l){return '<th class="cohort-th">'+l+'</th>';}).join('')
    +'</tr></thead><tbody>'
    +cohortData.map(function(c){
      return '<tr><td class="cohort-rn" title="'+c.label+'">'+c.label+'</td>'
        +'<td style="font-family:var(--fm);font-size:10px;color:var(--tx2);padding:0 6px;text-align:center">'+c.n+'</td>'
        +c.ret.map(function(v,i){return '<td><div class="cohort-cell" style="background:'+hcol(v)+';color:'+tcol(v)+'" title="'+c.label+' '+offLabels[i]+': '+(v===null?'нет данных':v+'%')+'">'+( v===null?'':v+'%')+'</div></td>';}).join('')
        +'</tr>';
    }).join('')
    +'</tbody></table></div>'
    +'<div class="hm-legend" style="margin-top:10px"><span>0%</span>'
    +[['#bfdbfe','10%'],['#93c5fd','25%'],['#60a5fa','40%'],['#3b82f6','60%'],['#2563eb','80%'],['#1d4ed8','100%']].map(function(x){return '<span class="hm-lc" style="background:'+x[0]+'"></span><span style="font-size:10px;color:var(--mt)">'+x[1]+'</span>';}).join('')
    +'</div></div>'
    +'<div class="cc"><div class="cc-ti">Средний Retention по месяцам <span>% активных клиентов когорты</span></div>'
    +'<div class="ch-wrap" style="height:200px"><canvas id="ch-cohort-avg"></canvas></div></div>'
    +'</div>';
  CHARTS.cohortAvg=new Chart(document.getElementById('ch-cohort-avg'),{
    type:'line',
    data:{labels:offLabels,datasets:[{label:'Avg Retention %',data:avgRet,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.12)',fill:true,tension:.4,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#3b82f6',spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{...CHART_DEF.plugins,legend:{display:false}},scales:{x:{ticks:{color:'#56709a',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},y:{min:0,max:100,ticks:{color:'#56709a',font:{size:9},callback:function(v){return v+'%';}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}}}}
  });
}



// ═══════════════════════════════════════════════════════════════════════════
// ─── HEATMAP — Equipment Sales by Group × Time ─────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
function renderHeatmap(m){
  // Aggregate prodMo data across all clients
  const groupMonthMap={};
  DATA.forEach(function(r){
    Object.entries(r.prodMo||{}).forEach(function([group,monthly]){
      if(!groupMonthMap[group])groupMonthMap[group]=new Array(ML.length).fill(0);
      (monthly||[]).forEach(function(v,mi){if(mi<ML.length)groupMonthMap[group][mi]+=v;});
    });
  });

  // Also aggregate from prod totals (fallback if prodMo not available)
  // Sort groups by total revenue
  const groups=Object.entries(groupMonthMap)
    .map(function([name,mo]){return{name,mo,total:mo.reduce(function(s,v){return s+v;},0)};})
    .filter(function(g){return g.total>0;})
    .sort(function(a,b){return b.total-a.total;})
    .slice(0,25);

  if(!groups.length){
    // Try to use prod totals as fallback (no monthly breakdown)
    const prodTotals={};
    DATA.forEach(function(r){
      Object.entries(r.prod||{}).forEach(function([g,v]){prodTotals[g]=(prodTotals[g]||0)+v;});
    });
    const fallbackGroups=Object.entries(prodTotals).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
    if(!fallbackGroups.length){
      m.innerHTML='<div class="pg"><div class="pg-hd"><div class="pg-ti">Тепловая карта</div></div><div class="no-data" style="padding:60px">Нет данных о товарных группах.<br><span style="font-size:11px;color:var(--mt)">Загрузи файл с детализацией по товарам.</span></div></div>';
      return;
    }
    // Show simplified bar chart when no monthly breakdown
    m.innerHTML='<div class="pg">'+
      '<div class="pg-hd"><div class="pg-ti">🌡️ Тепловая карта</div><div class="pg-su">Товарные группы × время</div></div>'+
      analysisNote('О тепловой карте','Показывает интенсивность продаж по каждой товарной группе в разрезе месяцев. <strong>Цвет ячейки</strong> = объём выручки (красный — максимум, синий — минимум). Позволяет видеть сезонность спроса на конкретные группы оборудования и находить «горячие» периоды для планирования.')+
      '<div class="cc"><div class="cc-ti">Выручка по товарным группам <span>(без помесячной разбивки — данные агрегированы)</span></div>'+
      '<div class="ch-wrap" style="height:320px"><canvas id="ch-hm-bar"></canvas></div></div></div>';
    const top12=fallbackGroups.slice(0,12);
    CHARTS.hmBar=new Chart(document.getElementById('ch-hm-bar'),{
      type:'bar',indexAxis:'y',
      data:{labels:top12.map(function(d){return d[0];}),datasets:[{data:top12.map(function(d){return Math.round(d[1]/1000);}),backgroundColor:PC.slice(0,12),borderRadius:4}]},
      options:{maintainAspectRatio:false,plugins:{...CHART_DEF.plugins,legend:{display:false}},scales:{
        x:{ticks:{color:'#56709a',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},
        y:{ticks:{color:'#7a94bb',font:{size:9}},grid:{display:false},border:{display:false}}
      }}
    });
    return;
  }

  // Compute 95th percentile for colour scaling
  const allVals=groups.flatMap(function(g){return g.mo;}).filter(function(v){return v>0;});
  allVals.sort(function(a,b){return a-b;});
  const p95=allVals[Math.floor(allVals.length*0.92)]||Math.max(...allVals,1);

  function hcol(v){
    if(!v)return'rgba(255,255,255,.03)';
    const rt=Math.min(1,v/p95);
    if(rt>.85)return'rgba(244,63,94,.85)';
    if(rt>.65)return'rgba(251,113,60,.8)';
    if(rt>.45)return'rgba(245,158,11,.75)';
    if(rt>.25)return'rgba(34,211,238,.55)';
    if(rt>.08)return'rgba(79,142,247,.5)';
    return'rgba(79,142,247,.22)';
  }
  const shortML=ML.map(function(l){return l.replace(/\.\d{2}$/,'');});
  const top5=groups.slice(0,5);

  m.innerHTML='<div class="pg">'+
    '<div class="pg-hd"><div class="pg-ti">🌡️ Тепловая карта оборудования</div><div class="pg-su">Интенсивность продаж '+groups.length+' групп × '+ML.length+' месяцев</div></div>'+
    analysisNote('Как читать тепловую карту','<strong>Строка</strong> = товарная группа, <strong>столбец</strong> = месяц. <strong>Цвет</strong> = объём выручки: 🔴 красный — пик, 🔵 синий — минимум, прозрачный — нет продаж. <strong>Сезонность</strong>: ищите вертикальные полосы (сезонный спрос на группу) и горизонтальные пятна (горячие месяцы). Используйте для планирования закупок и промо-акций.')+
    '<div class="cc" style="margin-bottom:16px">'+
    '<div class="cc-ti">Продажи по товарным группам <span>тыс. руб. · топ-'+groups.length+'</span></div>'+
    '<div class="heatmap-wrap"><table class="hm-table">'+
    '<thead><tr>'+
    '<th class="hm-rn" style="border:none;background:transparent;font-size:10px;color:var(--mt);font-weight:500;padding-right:10px;min-width:150px">Группа / Месяц</th>'+
    shortML.map(function(l){return'<th class="hm-th">'+l+'</th>';}).join('')+
    '<th class="hm-th" style="color:var(--tx2);min-width:56px">Итого</th>'+
    '</tr></thead>'+
    '<tbody>'+groups.map(function(g){
      return'<tr>'+
        '<td class="hm-rn" title="'+esc(g.name)+'">'+esc(g.name)+'</td>'+
        g.mo.map(function(v,i){return'<td title="'+ML[i]+': '+fmt(v)+'"><div class="hm-cell" style="background:'+hcol(v)+';width:28px;height:20px"></div></td>';}).join('')+
        '<td style="font-family:var(--fm);font-size:10px;color:var(--tx2);padding-left:6px;white-space:nowrap">'+fmt(g.total)+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table>'+
    '<div class="hm-legend" style="margin-top:10px">'+
    '<span style="font-size:11px">Нет продаж</span>'+
    '<span class="hm-lc" style="background:rgba(79,142,247,.3)"></span>'+
    '<span class="hm-lc" style="background:rgba(34,211,238,.55)"></span>'+
    '<span class="hm-lc" style="background:rgba(245,158,11,.75)"></span>'+
    '<span class="hm-lc" style="background:rgba(251,113,60,.8)"></span>'+
    '<span class="hm-lc" style="background:rgba(244,63,94,.85)"></span>'+
    '<span style="font-size:11px">Максимум</span>'+
    '</div></div></div>'+
    '<div class="cc">'+
    '<div class="cc-ti">Динамика топ-5 групп <span>тыс. руб.</span></div>'+
    '<div class="ch-wrap" style="height:220px"><canvas id="ch-hm-trend"></canvas></div></div>'+
    '</div>';

  CHARTS.hmTrend=new Chart(document.getElementById('ch-hm-trend'),{
    type:'line',
    data:{
      labels:ML,
      datasets:top5.map(function(g,i){return{
        label:g.name.split(' ').slice(0,4).join(' '),
        data:g.mo.map(function(v){return Math.round(v/1000);}),
        borderColor:PC[i],backgroundColor:'transparent',
        tension:.4,borderWidth:2,pointRadius:2,pointBackgroundColor:PC[i]
      };})
    },
    options:{
      maintainAspectRatio:false,
      plugins:{...CHART_DEF.plugins},
      scales:{
        x:{ticks:{color:'#56709a',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},
        y:{ticks:{color:'#56709a',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}}
      }
    }
  });
}

// ─── CHURN ANALYSIS ─────────────────────────────────────────────────────────

function getChurnRisk(r){
  const n=ML.length;
  const last3=r.mo.slice(-3).reduce((a,b)=>a+b,0);
  const prev3=r.mo.slice(-6,-3).reduce((a,b)=>a+b,0);
  const last6=r.mo.slice(-6).reduce((a,b)=>a+b,0);
  const prev6=r.mo.slice(-Math.min(12,n),-6).reduce((a,b)=>a+b,0);
  const freq=r.mo.filter(v=>v>0).length;
  const recency=n-1-r.rec; // months since last purchase

  let score=0,reasons=[];
  // Recency signal
  if(recency>=4){score+=3;reasons.push('не покупал '+recency+' мес.');}
  else if(recency>=2){score+=1;reasons.push('пауза '+recency+' мес.');}
  // Revenue drop
  if(prev3>0&&last3<prev3*.3){score+=3;reasons.push('выручка упала на '+Math.round((1-last3/prev3)*100)+'%');}
  else if(prev3>0&&last3<prev3*.6){score+=2;reasons.push('выручка снизилась на '+Math.round((1-last3/prev3)*100)+'%');}
  // Frequency drop
  if(freq<=2&&n>=6){score+=2;reasons.push('покупал всего '+freq+' раз');}
  // 6-month trend
  if(prev6>0&&last6<prev6*.5){score+=1;reasons.push('полугодовой спад');}

  const level=score>=6?'critical':score>=4?'high':score>=2?'medium':'low';
  return{...r,churnScore:score,churnLevel:level,churnReasons:reasons,
    rev3:last3,rev3p:prev3,recency};
}

    </tr></thead><tbody>

// ─── CROSS-SELL ANALYSIS ─────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
function renderCrossSell(m){
  // Build co-purchase matrix: which product groups are bought together
  const groups=[...new Set(DATA.flatMap(r=>Object.keys(r.prod)))].filter(g=>g&&g!=='Прочее'&&g!=='Нет данных');
  const coMatrix={};
  groups.forEach(a=>groups.forEach(b=>{if(a!==b){const k=a+'|||'+b;if(!coMatrix[k])coMatrix[k]={a,b,both:0,onlyA:0};}}) );

  DATA.forEach(r=>{
    const rGroups=Object.keys(r.prod).filter(g=>g&&g!=='Прочее'&&g!=='Нет данных');
    rGroups.forEach(a=>{
      rGroups.forEach(b=>{if(a!==b){const k=a+'|||'+b;if(coMatrix[k])coMatrix[k].both++;}});
    });
  });

  // Count clients per group
  const groupCounts={};
  DATA.forEach(r=>Object.keys(r.prod).forEach(g=>{groupCounts[g]=(groupCounts[g]||0)+1;}));

  // Calculate lift: P(B|A) / P(B)
  const rules=Object.values(coMatrix)
    .filter(c=>c.both>=2)
    .map(c=>{
      const pA=groupCounts[c.a]||1;
      const pB=groupCounts[c.b]||1;
      const pAB=c.both;
      const confidence=pAB/pA;
      const lift=confidence/(pB/DATA.length);
      return{...c,confidence,lift,pA,pB};
    })
    .filter(r=>r.confidence>=0.2&&r.lift>=1.2)
    .sort((a,b)=>b.lift-a.lift)
    .slice(0,20);

  // Find clients who buy A but NOT B (cross-sell candidates)
  function getCrossCandidates(a,b){
    return DATA.filter(r=>r.prod[a]&&!r.prod[b]).sort((a,b)=>b.total-a.total);
  }

  const aiAvail=hasAIKey();
  const topGroups=Object.entries(groupCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);

  m.innerHTML=`<div class="pg">
    <div class="pg-hd"><div class="pg-ti">🔗 Кросс-продажи</div>
      <div class="pg-su">Связки товарных групп · ${rules.length} правил ассоциации</div></div>
    ${analysisNote('Как работают кросс-продажи',
      '<strong>Уверенность (Conf)</strong> — % клиентов группы A, которые также купили B. <strong>Lift</strong> — насколько связь A→B сильнее случайной (Lift >1 = есть закономерность, >2 = сильная). Например: Lift 2.4 означает, что клиенты, купившие A, берут B в 2.4 раза чаще, чем все остальные. <strong>Кандидаты</strong> — клиенты, купившие A, но ещё не B — приоритет для звонка.')}
    <div class="cg22" style="margin-bottom:16px">
      <div class="cc">
        <div class="cc-ti">Топ-10 ассоциативных правил <span>Lift ↑</span></div>
        ${rules.length?`<div style="overflow-y:auto;max-height:320px">
          ${rules.slice(0,10).map((r,i)=>`<div style="padding:9px 0;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px" class="cross-rule" data-rule="${i}">
            <div style="flex:1;min-width:0">
              <div style="font-size:11.5px;color:var(--wh);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.a)}">${esc(r.a)}</div>
              <div style="font-size:10px;color:var(--mt);margin:2px 0">→ вероятно купит →</div>
              <div style="font-size:11.5px;color:var(--acc);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.b)}">${esc(r.b)}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:var(--fm);font-size:13px;color:${r.lift>=2?'var(--gr)':r.lift>=1.5?'var(--warm)':'var(--tx2)'}">×${r.lift.toFixed(1)} Lift</div>
              <div style="font-size:10px;color:var(--mt)">${Math.round(r.confidence*100)}% conf · ${r.both} кл.</div>
              <div style="font-size:10px;color:var(--cy);margin-top:2px;cursor:pointer" onclick="showCrossCandidates('${esc(r.a)}','${esc(r.b)}')">👥 ${getCrossCandidates(r.a,r.b).length} кандидатов</div>
            </div>
          </div>`).join('')}
        </div>`:'<div class="no-data" style="padding:30px">Недостаточно данных для поиска связок.<br><span style="font-size:11px">Нужно больше клиентов с несколькими товарными группами.</span></div>'}
      </div>
      <div class="cc">
        <div class="cc-ti">Популярность групп <span>кол-во клиентов</span></div>
        <div class="ch-wrap" style="height:300px"><canvas id="ch-cross-pop"></canvas></div>
      </div>
    </div>
    ${aiAvail&&rules.length?`<div class="cc" style="margin-bottom:16px">
      <div class="cc-ti" style="margin-bottom:12px">🤖 AI-рекомендации по кросс-продажам</div>
      <button class="ai-btn" id="cross-ai-btn">🤖 Получить стратегию кросс-продаж</button>
      <div id="cross-ai-result" style="margin-top:14px"></div>
    </div>`:''}
    <div class="cc">
      <div class="cc-ti" id="cross-cand-title">Выбери правило выше → увидишь кандидатов</div>
      <div id="cross-candidates"></div>
    </div>
  </div>`;

  // Popularity chart
  CHARTS.crossPop=new Chart(document.getElementById('ch-cross-pop'),{
    type:'bar',indexAxis:'y',
    data:{labels:topGroups.map(([n])=>n),
          datasets:[{data:topGroups.map(([,v])=>v),backgroundColor:PC.slice(0,12),borderRadius:3}]},
    options:{maintainAspectRatio:false,plugins:{...CHART_DEF.plugins,legend:{display:false}},
      scales:{x:{ticks:{color:'#56709a',font:{size:9}},grid:{color:'rgba(255,255,255,.03)'},border:{display:false}},
              y:{ticks:{color:'#7a94bb',font:{size:9}},grid:{display:false},border:{display:false}}}}
  });

  // Show candidates global fn
  window.showCrossCandidates=function(a,b){
    const cands=getCrossCandidates(a,b);
    const titleEl=document.getElementById('cross-cand-title');
    const candEl=document.getElementById('cross-candidates');
    if(titleEl)titleEl.textContent=`👥 Кандидаты: купили «${a}», но не «${b}» — ${cands.length} клиентов`;
    if(!candEl)return;
    if(!cands.length){candEl.innerHTML='<div class="no-data" style="padding:20px">Все клиенты уже покупают обе группы</div>';return;}
    candEl.innerHTML=`<table><thead><tr><th>#</th><th>Клиент</th><th>Менеджер</th><th>Выручка</th><th>Посл. покупка</th><th>Вероятность</th></tr></thead>
    <tbody>${cands.slice(0,20).map((r,i)=>`<tr style="cursor:pointer" data-cci="${i}">
      <td class="td-mono" style="color:var(--mt)">${i+1}</td>
      <td class="td-name">${esc(r.name)}</td>
      <td class="td-mgr">${esc(r.mgr)}</td>
      <td class="td-mono">${fmt(r.total)}</td>
      <td class="td-mono">${r.rec>=0?ML[r.rec]:'—'}</td>
      <td>${pbHtml(r.prob)}</td>
    </tr>`).join('')}</tbody></table>`;
    candEl.querySelectorAll('tbody tr').forEach((tr,i)=>tr.addEventListener('click',()=>showClientModal(cands[i])));
  };

  // AI cross-sell strategy
  if(aiAvail&&rules.length){
    document.getElementById('cross-ai-btn')?.addEventListener('click',async function(){
      const resEl=document.getElementById('cross-ai-result');
      this.disabled=true;this.textContent='⏳ Анализирую...';

// ── Helpers ──────────────────────────────────────────────────
function rFmt(v){if(!v||isNaN(v))return'—';if(v>=1e9)return(v/1e9).toFixed(2)+' млрд ₽';if(v>=1e6)return(v/1e6).toFixed(1)+' млн ₽';if(v>=1e3)return(v/1e3).toFixed(0)+' тыс ₽';return Math.round(v)+' ₽';}
function rPct(v){return Math.round(v*100)+'%';}

// ── Collect all analytics for the report ─────────────────────
function collectReportData(){
  const N=ML.length;
  const totalRev=DATA.reduce((s,r)=>s+r.total,0);
  const hot=DATA.filter(r=>r.prob>=.7);
  const warm=DATA.filter(r=>r.prob>=.4&&r.prob<.7);
  const cold=DATA.filter(r=>r.prob<.4);
  const mgrs=[...new Set(DATA.map(r=>r.mgr))];

  // ABC
  const abcRows=getABCXYZRows();
  const abcA=abcRows.filter(r=>r.abc==='A');
  const abcB=abcRows.filter(r=>r.abc==='B');
  const abcC=abcRows.filter(r=>r.abc==='C');
  const revA=abcA.reduce((s,r)=>s+r.total,0);
  const revB=abcB.reduce((s,r)=>s+r.total,0);
  const revC=abcC.reduce((s,r)=>s+r.total,0);

  // Churn
  const churnRows=DATA.map(r=>getChurnRisk(r));
  const critical=churnRows.filter(r=>r.churnLevel==='critical');
  const highRisk=churnRows.filter(r=>r.churnLevel==='high');
  const sleeping=churnRows.filter(r=>{const recency=N-1-r.rec;return recency>=4;});

  // LTV
  const ltvRows=getLTVRows();
  const avgLTV=ltvRows.length?Math.round(ltvRows.reduce((s,r)=>s+r.ltv,0)/ltvRows.length):0;
  const top5ltv=ltvRows.slice(0,5);

  // Manager stats
  const mgrStats=buildMgrStats();

  // Monthly trend
  const mdata=ML.map((_,i)=>DATA.reduce((s,r)=>(r.mo[i]||0)+s,0));
  const lastMo=mdata[N-1]||0;
  const prevMo=mdata[N-2]||0;
  const moChange=prevMo>0?((lastMo-prevMo)/prevMo*100):0;

  // Cross-sell top opportunities
  const prodMap={};
  DATA.forEach(r=>Object.entries(r.prod).forEach(([g,v])=>{prodMap[g]=(prodMap[g]||0)+v;}));
  const topProds=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Top clients (hot)
  const top10=DATA.slice(0,10);

  return{
    N,totalRev,hot,warm,cold,mgrs,mgrStats,
    abcA,abcB,abcC,revA,revB,revC,
    critical,highRisk,sleeping,
    ltvRows,avgLTV,top5ltv,
    mdata,lastMo,prevMo,moChange,
    topProds,top10,
    period:(ML.length?ML[0]+' — '+ML[ML.length-1]:'весь период'),
    churnRows
  };
}

    if(!vals.length)return'';
    const mx=Math.max(...vals,1),mn=Math.min(...vals,0);
    const range=mx-mn||1;
    return vals.map((v,i)=>{
      const x=Math.round(i/(vals.length-1)*w);
      const y=Math.round(h-(v-mn)/range*h);
      return(i===0?'M':'L')+x+','+y;
    }).join(' ');

  const sparkW=200,sparkH=50;

// ── Generate AI sections async ────────────────────────────────
async function generateAISections(d){
  if(!hasAIKey()) return {};
  const prov=AI_PROVIDERS[AI_CFG.provider||'groq']?.name||'AI';

  const baseSys=`Ты — коммерческий директор B2B компании по продаже оборудования. Пишешь раздел профессионального аналитического отчёта. Используй <strong> для выделений. Пиши конкретно с цифрами. Отвечай на русском.`;

  const metrics=`
Данные клиентской базы (${d.period}):
- Клиентов: ${d.hot.length+d.warm.length+d.cold.length}, менеджеров: ${d.mgrs.length}
- Выручка: ${rFmt(d.totalRev)}
- Горячих (70%+): ${d.hot.length}, тёплых: ${d.warm.length}, холодных: ${d.cold.length}
- ABC: A=${d.abcA.length} кл. (${rFmt(Math.round(d.revA))}), B=${d.abcB.length} (${rFmt(Math.round(d.revB))}), C=${d.abcC.length} (${rFmt(Math.round(d.revC))})
- Под критическим риском: ${d.critical.length}, высокий риск: ${d.highRisk.length}
- Средний LTV: ${rFmt(d.avgLTV)}
- Последний мес.: ${rFmt(d.lastMo)} (${d.moChange>=0?'+':''}${d.moChange.toFixed(1)}%)
- Топ-менеджер: ${d.mgrStats[0]?.name||'—'} (${rFmt(d.mgrStats[0]?.rev||0)})`;

  async function ai(prompt){ try{ return await callAI(prompt,baseSys); }catch(e){ return '<em>AI недоступен: '+esc(e.message)+'</em>'; } }

  const [summary,trend,abc,managers,churn,final_] = await Promise.all([
    ai(`Напиши исполнительное резюме (4-5 предложений) для отчёта по клиентской базе.
${metrics}
Начни с главного вывода о состоянии базы.`),
    ai('Проанализируй динамику продаж (2-3 предложения). Последний месяц: '+rFmt(d.lastMo)+' ('+(d.moChange>=0?'+':'')+d.moChange.toFixed(1)+'% к пред.). Общая выручка: '+rFmt(d.totalRev)+'. История: '+ML.map((_,i)=>ML[i]+': '+rFmt(d.mdata[i])).join(', ')+'.'),
    ai(`Проанализируй ABC-сегментацию (3-4 предложения с выводами и рекомендациями).
A: ${d.abcA.length} кл., ${rFmt(Math.round(d.revA))} (${Math.round(d.revA/d.totalRev*100)}% выручки).
B: ${d.abcB.length} кл., ${rFmt(Math.round(d.revB))}.
C: ${d.abcC.length} кл., ${rFmt(Math.round(d.revC))}.
Топ клиент: ${d.hot[0]?.name||'—'} (${rFmt(d.hot[0]?.total||0)}).`),
    ai(`Проанализируй команду менеджеров (3-4 предложения).` + '\n' + d.mgrStats.slice(0,5).map(s=>s.name+': '+s.cnt+' кл., '+rFmt(s.rev)+', '+s.hot+' горячих ('+Math.round(s.hr*100)+'%)').join(', ')),
    ai(`Дай конкретные рекомендации по удержанию клиентов (3-4 пункта с «• »).
Критических: ${d.critical.length} — ${d.critical.slice(0,3).map(r=>r.name).join(', ')}.
Высокий риск: ${d.highRisk.length} кл.
Общий потенциал под угрозой: ${rFmt([...d.critical,...d.highRisk].reduce((s,r)=>s+r.total,0))}.`),
    ai(`Напиши финальные рекомендации руководителю (4-5 пунктов с «• », конкретно).
${metrics}`)
  ]);

  return{summary,trend,abc,managers,churn,final:final_};
}

// ─── NOTIFICATIONS ──────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
function buildNotifications(){
  if(!DATA.length)return;
  NOTIF_LIST=[];
  const now=new Date();
  const timeStr=now.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});

  // 🔥 Горячие клиенты — купят в ближайшие 7 дней
  const hot=DATA.filter(r=>r.prob>=.7&&r.nd<=7).slice(0,5);
  hot.forEach(r=>{
    NOTIF_LIST.push({ic:'🔥',title:'Готов купить: '+r.name.split(' ').slice(0,3).join(' '),
      sub:r.mgr+' · '+Math.round(r.prob*100)+'% · '+(r.nd===0?'сегодня':'≈'+r.nd+' дн.'),
      time:timeStr,clientIdx:DATA.indexOf(r)});
  });

  // ⚠️ Риск оттока — выручка упала >50% за 3 мес
  const atRisk=DATA.filter(r=>{
    const l3=r.mo.slice(-3).reduce((a,b)=>a+b,0);
    const p3=r.mo.slice(-6,-3).reduce((a,b)=>a+b,0);
    return p3>0&&l3<p3*.5&&r.total>100000;
  }).slice(0,4);
  atRisk.forEach(r=>{
    const l3=r.mo.slice(-3).reduce((a,b)=>a+b,0);
    const p3=r.mo.slice(-6,-3).reduce((a,b)=>a+b,0);
    const drop=Math.round((1-l3/p3)*100);
    NOTIF_LIST.push({ic:'⚠️',title:'Риск ухода: '+r.name.split(' ').slice(0,3).join(' '),
      sub:'Выручка упала на '+drop+'% · '+r.mgr,
      time:timeStr,clientIdx:DATA.indexOf(r)});
  });

  // 💤 Давно не покупали (>3 мес) крупные клиенты
  const N=ML.length;
  const sleeping=DATA.filter(r=>r.rec>=0&&(N-1-r.rec)>=3&&r.total>500000).slice(0,3);
  sleeping.forEach(r=>{
    NOTIF_LIST.push({ic:'💤',title:'Не покупает: '+r.name.split(' ').slice(0,3).join(' '),
      sub:(N-1-r.rec)+' мес. без покупок · '+fmt(r.total)+' выручки',
      time:timeStr,clientIdx:DATA.indexOf(r)});
  });

  updateNotifBadge();
  // Browser push notification (if permission granted)
  if(Notification.permission==='granted'&&NOTIF_LIST.length>0){
    new Notification('ML Продажник Pro',{
      body:NOTIF_LIST[0].title+' — '+NOTIF_LIST[0].sub,
      icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">📊</text></svg>'
    });
  }
}

function updateNotifBadge(){
  const cnt=document.getElementById('notif-cnt');
  if(!cnt)return;
  if(NOTIF_LIST.length>0){
    cnt.style.display='';
    cnt.textContent=NOTIF_LIST.length>9?'9+':NOTIF_LIST.length;
  } else {
    cnt.style.display='none';
  }
}

function toggleNotifPanel(){
  // Close if already open
  const existing=document.getElementById('notif-panel-el');
  if(existing){existing.remove();NOTIF_OPEN=false;return;}
  NOTIF_OPEN=true;

  const panel=document.createElement('div');
  panel.id='notif-panel-el';
  panel.className='notif-panel';
  panel.innerHTML=`<div class="notif-hd">
    <span style="font-size:16px">🔔</span>
    <span class="notif-hd-ti">Уведомления (${NOTIF_LIST.length})</span>
    <button class="notif-clear" id="notif-clear-all">Очистить</button>
  </div>
  <div class="notif-list">
    ${!NOTIF_LIST.length?'<div class="notif-empty">Нет уведомлений<br><span style="font-size:10px">Загрузите данные для анализа</span></div>'
    :NOTIF_LIST.map((n,i)=>`<div class="notif-item" data-ni="${i}">
      <div class="notif-item-ic">${n.ic}</div>
      <div class="notif-item-body">
        <div class="notif-item-title">${esc(n.title)}</div>
        <div class="notif-item-sub">${esc(n.sub)}</div>
      </div>
      <div class="notif-item-time">${n.time}</div>
    </div>`).join('')}
  </div>
  ${!NOTIF_LIST.length&&DATA.length?'<div style="padding:10px 16px;border-top:1px solid var(--bord)"><button class="set-btn secondary" id="notif-regen" style="width:100%;font-size:11px">🔄 Пересчитать</button></div>':''}`;

  document.body.appendChild(panel);
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',function handler(e){
    if(!panel.contains(e.target)&&e.target.id!=='notif-btn'){
      panel.remove();NOTIF_OPEN=false;
      document.removeEventListener('click',handler);
    }
  }),10);

  panel.querySelectorAll('.notif-item[data-ni]').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=NOTIF_LIST[parseInt(el.dataset.ni)];
      panel.remove();NOTIF_OPEN=false;
      if(n.clientIdx>=0&&n.clientIdx<DATA.length)showClientModal(DATA[n.clientIdx]);
    });
  });
  document.getElementById('notif-clear-all')?.addEventListener('click',()=>{
    NOTIF_LIST=[];updateNotifBadge();panel.remove();NOTIF_OPEN=false;
  });
  document.getElementById('notif-regen')?.addEventListener('click',()=>{
    buildNotifications();panel.remove();NOTIF_OPEN=false;
    setTimeout(()=>toggleNotifPanel(),50);
  });
}

// Request browser notification permission (called once after data loads)
function requestNotifPermission(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// ─── REPORT WITH PERIOD SELECTOR ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════
function collectReportDataForPeriod(si, ei){
  // si/ei = start/end index in ML array (or null = all)
  const s=si??0, e=ei??(ML.length-1);
  const N=ML.length;
  const getTotal=r=>r.mo.slice(s,e+1).reduce((a,b)=>a+b,0);

  // Filter clients that have ANY revenue in the period
  const periodData=DATA.map(r=>({...r,total:getTotal(r)}))
    .filter(r=>r.total>0)
    .sort((a,b)=>b.total-a.total);

  const totalRev=periodData.reduce((s,r)=>s+r.total,0);
  const hot=periodData.filter(r=>r.prob>=.7);
  const warm=periodData.filter(r=>r.prob>=.4&&r.prob<.7);
  const cold=periodData.filter(r=>r.prob<.4);
  const mgrs=[...new Set(periodData.map(r=>r.mgr))];

  // ABC for period
  const sorted=[...periodData].sort((a,b)=>b.total-a.total);
  let cum=0;
  const abcMap=new Map();
  sorted.forEach(r=>{cum+=r.total;const p=cum/totalRev;abcMap.set(r.name+'|'+r.mgr,p<=.8?'A':p<=.95?'B':'C');});
  const withABC=periodData.map(r=>({...r,abc:abcMap.get(r.name+'|'+r.mgr)||'C'}));
  const abcA=withABC.filter(r=>r.abc==='A');
  const abcB=withABC.filter(r=>r.abc==='B');
  const abcC=withABC.filter(r=>r.abc==='C');

  // Churn for period
  const churnRows=periodData.map(r=>{
    const mo=r.mo;
    const l3=mo.slice(Math.max(0,e-2),e+1).reduce((a,b)=>a+b,0);
    const p3=mo.slice(Math.max(0,e-5),Math.max(0,e-2)).reduce((a,b)=>a+b,0);
    let score=0; const reasons=[];
    if(p3>0&&l3<p3*.3){score+=3;reasons.push('выручка упала на '+Math.round((1-l3/p3)*100)+'%');}
    else if(p3>0&&l3<p3*.6){score+=2;reasons.push('выручка снизилась на '+Math.round((1-l3/p3)*100)+'%');}
    const rec=N-1-r.rec;
    if(rec>=4){score+=2;reasons.push('не покупал '+rec+' мес.');}
    else if(rec>=2){score+=1;reasons.push('пауза '+rec+' мес.');}
    const freq=mo.filter(v=>v>0).length;
    if(freq<=2&&ML.length>=6){score+=1;reasons.push('низкая частота');}
    return{...r,churnScore:score,churnLevel:score>=5?'critical':score>=3?'high':'medium',churnReasons:reasons};
  });
  const critical=churnRows.filter(r=>r.churnLevel==='critical');
  const highRisk=churnRows.filter(r=>r.churnLevel==='high');

  // LTV
  const ltvRows=periodData.map(r=>{
    const periodLen=e-s+1;
    const activeMo=r.mo.slice(s,e+1).filter(v=>v>0).length;
    const avgM=activeMo>0?r.total/activeMo:0;
    const ret=activeMo/Math.max(1,periodLen);
    const churn=Math.max(.05,1-ret);
    const ltv=Math.round(avgM/churn);
    return{...r,ltv};
  }).sort((a,b)=>b.ltv-a.ltv);
  const avgLTV=ltvRows.length?Math.round(ltvRows.reduce((s,r)=>s+r.ltv,0)/ltvRows.length):0;

  // Monthly data for period
  const mdata=ML.slice(s,e+1).map((_,i)=>DATA.reduce((acc,r)=>(r.mo[s+i]||0)+acc,0));
  const lastMo=mdata[mdata.length-1]||0;
  const prevMo=mdata.length>1?mdata[mdata.length-2]||0:0;
  const moChange=prevMo>0?(lastMo-prevMo)/prevMo*100:0;

  // Manager stats
  const mgrMap={};
  periodData.forEach(r=>{
    if(!mgrMap[r.mgr])mgrMap[r.mgr]={name:r.mgr,cnt:0,rev:0,hot:0,cli:[]};
    mgrMap[r.mgr].cnt++;mgrMap[r.mgr].rev+=r.total;
    if(r.prob>=.7)mgrMap[r.mgr].hot++;
    mgrMap[r.mgr].cli.push(r);
  });
  const mgrStats=Object.values(mgrMap)
    .map(x=>({...x,avg:x.rev/x.cnt,hr:x.hot/x.cnt,
      ap:x.cli.reduce((s,r)=>s+r.prob,0)/Math.max(1,x.cli.length)}))
    .sort((a,b)=>b.rev-a.rev);

  // Top products in period
  const prodMap={};
  DATA.forEach(r=>Object.entries(r.prod||{}).forEach(([g,v])=>{prodMap[g]=(prodMap[g]||0)+v;}));
  const topProds=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([name,value])=>({name,value}));

  return{
    hot,warm,cold,mgrs,abcA,abcB,abcC,
    revA:abcA.reduce((s,r)=>s+r.total,0),
    revB:abcB.reduce((s,r)=>s+r.total,0),
    revC:abcC.reduce((s,r)=>s+r.total,0),
    critical,highRisk,ltvRows:ltvRows.slice(0,15),avgLTV,top5ltv:ltvRows.slice(0,5),
    mdata,lastMo,prevMo,moChange,topProds,
    top10:periodData.slice(0,10),mgrStats,totalRev,
    period:ML[s]+' — '+ML[e],
    churnRows:churnRows.slice(0,20)
  };
}


// ─── REVENUE FORECAST ─────────────────────────────────────────────────────
function linReg(ys){
  const n=ys.length;
  const xm=(n-1)/2;
  const ym=ys.reduce((s,v)=>s+v,0)/n;
  const num=ys.reduce((s,v,i)=>s+(i-xm)*(v-ym),0);
  const den=ys.reduce((s,_,i)=>s+(i-xm)**2,0);
  const slope=den?num/den:0;
  return{slope,intercept:ym-slope*xm};
}
function forecastNextMonths(count){
  const mdata=ML.map((_,i)=>DATA.reduce((s,r)=>(r.mo[i]||0)+s,0));
  const{slope,intercept}=linReg(mdata);
  const n=mdata.length;
  const projected=Array.from({length:count},(_,i)=>Math.max(0,Math.round(intercept+slope*(n+i))));
  const resStd=Math.sqrt(mdata.reduce((s,y,i)=>s+(y-(intercept+slope*i))**2,0)/Math.max(1,n));
  return{mdata,projected,slope,resStd};
}
function nextMonthLabels(count){
  const MN=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  if(!ML.length)return Array.from({length:count},(_,i)=>'M+'+(i+1));
  const last=ML[ML.length-1];
  const mm=last.match(/([А-Яа-яёЁ]+)\.(\d{2})$/);
  if(!mm)return Array.from({length:count},(_,i)=>'M+'+(i+1));
  const found=MN.findIndex(mn=>mm[1].startsWith(mn.slice(0,3)));
  let year=parseInt('20'+mm[2]),month=found<0?0:found;
  return Array.from({length:count},()=>{month++;if(month>=12){month=0;year++;}return MN[month]+'.'+String(year).slice(-2)+' ▸';});
}

    return CHAT_HISTORY.map(msg=>{
      if(msg.role==='user')return`<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><div style="background:linear-gradient(135deg,var(--acc),var(--pu));color:#fff;border-radius:12px 12px 3px 12px;padding:10px 14px;max-width:75%;font-size:12.5px;line-height:1.6">${esc(msg.content)}</div></div>`;
      return`<div style="display:flex;gap:10px;margin-bottom:12px"><div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--pu),var(--acc));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🤖</div><div style="background:var(--s2);border:1px solid var(--bord);border-radius:3px 12px 12px 12px;padding:10px 14px;max-width:82%;font-size:12.5px;line-height:1.7;color:var(--tx)">${msg.content}</div></div>`;
    }).join('');}
  m.innerHTML=`<div class="pg" style="display:flex;flex-direction:column;min-height:calc(100vh - 40px)">
    <div class="pg-hd" style="flex-shrink:0"><div><div class="pg-ti">💬 AI Чат с данными</div><div class="pg-su">Задай любой вопрос по клиентской базе</div></div>
      <button class="set-btn secondary" id="chat-clear" style="font-size:11px">🗑 Очистить</button></div>
    ${!aiAvail?`<div class="ai-card" style="margin-bottom:16px"><div class="ai-hd"><span class="ai-hd-ic">⚙️</span><span class="ai-hd-ti">AI не настроен</span></div><div class="ai-body">Настрой ключ в <button onclick="PAGE='settings';buildSidebar();renderPage();" style="background:none;border:1px solid var(--acc);color:var(--acc);border-radius:6px;padding:2px 10px;font-size:11px;cursor:pointer;font-family:var(--fb)">⚙️ Настройки</button></div></div>`:''}
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:4px 0;margin-bottom:14px;min-height:200px">
      ${CHAT_HISTORY.length?renderMsgs():`<div style="text-align:center;padding:40px 20px;color:var(--mt)"><div style="font-size:36px;margin-bottom:12px">💬</div><div style="font-size:13px;margin-bottom:20px">Задай вопрос по базе</div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">${suggests.map(q=>`<button class="sort-btn chat-sug" style="cursor:pointer">${q}</button>`).join('')}</div></div>`}
    </div>
    <div style="flex-shrink:0;display:flex;gap:8px;align-items:flex-end">
      <textarea id="chat-inp" placeholder="Задай вопрос..." rows="1" ${!aiAvail?'disabled':''}
        style="flex:1;background:var(--s2);border:1px solid var(--bord2);border-radius:var(--rad);padding:10px 14px;font-size:13px;color:var(--tx);font-family:var(--fb);outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color .15s"></textarea>
      <button class="ai-btn" id="chat-send" style="padding:10px 18px;flex-shrink:0;height:44px" ${!aiAvail?'disabled':''}>➤ Отправить</button>
    </div>
  </div>`;
  const ta=document.getElementById('chat-inp');
  if(ta){ta.addEventListener('input',()=>{ta.style.height='44px';ta.style.height=Math.min(120,ta.scrollHeight)+'px';});ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});ta.focus();}
  m.querySelectorAll('.chat-sug').forEach(btn=>btn.addEventListener('click',()=>{const t=document.getElementById('chat-inp');if(t){t.value=btn.textContent;doSend();}}));
  document.getElementById('chat-send')?.addEventListener('click',doSend);
  document.getElementById('chat-clear')?.addEventListener('click',()=>{CHAT_HISTORY=[];renderChat(m);});
  const msgs=document.getElementById('chat-msgs');
  if(msgs&&CHAT_HISTORY.length)msgs.scrollTop=msgs.scrollHeight;
  async function doSend(){
    const inp=document.getElementById('chat-inp');
    const msgs2=document.getElementById('chat-msgs');
    if(!inp||!inp.value.trim())return;
    const q=inp.value.trim();inp.value='';inp.style.height='44px';
    CHAT_HISTORY.push({role:'user',content:q});
    if(msgs2){msgs2.innerHTML=renderMsgs()+`<div style="display:flex;gap:10px;margin-bottom:12px"><div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--pu),var(--acc));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🤖</div><div style="background:var(--s2);border:1px solid var(--bord);border-radius:3px 12px 12px 12px;padding:10px 14px"><div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="font-size:12px;color:var(--mt)">Думаю...</span></div></div></div>`;msgs2.scrollTop=msgs2.scrollHeight;}
    const sendBtn=document.getElementById('chat-send');if(sendBtn)sendBtn.disabled=true;
    try{const txt=await callAI(q,buildChatCtx());CHAT_HISTORY.push({role:'assistant',content:txt});}
    catch(e){CHAT_HISTORY.push({role:'assistant',content:`<span style="color:var(--hot)">❌ ${esc(e.message)}</span>`});}
    if(msgs2){msgs2.innerHTML=renderMsgs();msgs2.scrollTop=msgs2.scrollHeight;}
    if(sendBtn)sendBtn.disabled=false;
    const inpEl=document.getElementById('chat-inp');if(inpEl)inpEl.focus();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────
Chart.defaults.color='#7a94bb';
Chart.defaults.borderColor='rgba(255,255,255,.05)';

// ── THEME TOGGLE ──────────────────────────────────────────────────────────
function applyTheme(){
  if(DARK_MODE){
    document.documentElement.classList.remove('light');
    Chart.defaults.color='#7a94bb';
    Chart.defaults.borderColor='rgba(255,255,255,.05)';
  } else {
    document.documentElement.classList.add('light');
    Chart.defaults.color='#436078';
    Chart.defaults.borderColor='rgba(30,60,120,.07)';
  }
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=DARK_MODE?'☀️':'🌙';
}
document.addEventListener('click',function(e){
  if(e.target.id==='theme-btn'){
    DARK_MODE=!DARK_MODE;
    applyTheme();
    if(DATA.length)renderPage();
  }
});

// ── MOBILE OVERFLOW FIX ───────────────────────────────────────────────────
function fixMobileOverflow(){
  const mobile=window.innerWidth<=860;
  document.body.style.overflow=mobile?'auto':'hidden';
  document.documentElement.style.overflow=mobile?'auto':'hidden';
  const app=document.getElementById('app');
  if(app)app.style.height=mobile?'auto':'100vh';
}
window.addEventListener('resize',fixMobileOverflow);
fixMobileOverflow();

buildSidebar();
renderPage();
</script>
</body>
</html>
